<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMO Database - Military Equipment</title>
  <meta name="description" content="Interactive database of military equipment from Command: Modern Operations. Browse aircraft, ships, weapons, sensors, and facilities for 90+ nations with detailed specifications.">
  <meta property="og:title" content="CMO Database - Military Equipment">
  <meta property="og:description" content="Browse military aircraft, ships, weapons, sensors & facilities for 90+ nations with detailed specs from Command: Modern Operations.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
  <link rel="preconnect" href="https://en.wikipedia.org" crossorigin>
  <link rel="preconnect" href="https://upload.wikimedia.org" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a href="#content" class="skip-link">Skip to content</a>
  <header class="header">
    <div class="header-left">
      <h1 class="logo">CMO<span class="logo-accent">DB</span></h1>
      <span class="logo-subtitle" id="logoSubtitle">US Military Equipment Database</span>
    </div>
    <div class="header-right">
      <button class="country-select-btn" id="countrySelectBtn" aria-haspopup="dialog" aria-expanded="false">
        <img class="country-flag" id="countrySelectFlag" src="https://flagcdn.com/w20/us.png" width="20" height="14" alt="US">
        <span class="country-name" id="countrySelectLabel">United States</span>
        <svg class="country-chevron" viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
      </button>
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="globalSearch" class="search-input" placeholder="Search all categories...">
      </div>
      <button id="compareBtn" class="btn btn-compare" disabled>
        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M10 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h5v-2H5V5h5V3zm4 18h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-5v2h5v14h-5v2z"/></svg>
        Compare (<span id="compareCount">0</span>)
      </button>
    </div>
  </header>

  <nav class="nav">
    <button class="nav-btn active" data-category="aircraft" aria-current="page">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/></svg>
      Aircraft
    </button>
    <button class="nav-btn" data-category="ships">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M20 21c-1.39 0-2.78-.47-4-1.32-2.44 1.71-5.56 1.71-8 0C6.78 20.53 5.39 21 4 21H2v2h2c1.38 0 2.74-.35 4-.99 2.52 1.29 5.48 1.29 8 0 1.26.65 2.62.99 4 .99h2v-2h-2zM3.95 19H4c1.6 0 3.02-.88 4-2 .98 1.12 2.4 2 4 2s3.02-.88 4-2c.98 1.12 2.4 2 4 2h.05l1.89-6.68c.08-.26.06-.54-.06-.78s-.34-.42-.6-.5L20 10.62V6c0-1.1-.9-2-2-2h-3V1H9v3H6c-1.1 0-2 .9-2 2v4.62l-1.29.42c-.26.08-.48.26-.6.5s-.14.52-.05.78L3.95 19zM6 6h12v3.97L12 8 6 9.97V6z"/></svg>
      Ships
    </button>
    <button class="nav-btn" data-category="weapons">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 5h10v2h2V3c0-1.1-.9-2-2-2H7c-1.1 0-2 .9-2 2v4h2V5zm8.41 11.59L20 12l-4.59-4.59L14 8.83 17.17 12 14 15.17l1.41 1.42zM10 15.17L6.83 12 10 8.83 8.59 7.41 4 12l4.59 4.59L10 15.17zM17 19H7v-2H5v4c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-4h-2v2z"/></svg>
      Weapons
    </button>
    <button class="nav-btn" data-category="sensors">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      Sensors
    </button>
    <button class="nav-btn" data-category="infantry">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C13.1 2 14 2.9 14 4S13.1 6 12 6 10 5.1 10 4 10.9 2 12 2zM21 9h-6v13h-2v-6h-2v6H9V9H3V7h18v2z"/></svg>
      Infantry
    </button>
    <button class="nav-btn" data-category="armor">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M18 3H6C3.79 3 2 4.79 2 7v4c0 2.21 1.79 4 4 4h1l-1.5 3h2l1.5-3h6l1.5 3h2L16 15h2c2.21 0 4-1.79 4-4V7c0-2.21-1.79-4-4-4zm-1 9H7c-.55 0-1-.45-1-1V8c0-.55.45-1 1-1h10c.55 0 1 .45 1 1v3c0 .55-.45 1-1 1zM4 19h16v2H4v-2z"/></svg>
      Armor
    </button>
    <button class="nav-btn" data-category="artillery">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7 19h10v2H7v-2zm14.4-8.2L17 4h-2l-1 3H10L9 4H7L2.6 10.8 4 12l3-2v5h10v-5l3 2 1.4-1.2zM12 2c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2z"/></svg>
      Artillery
    </button>
    <button class="nav-btn" data-category="airdefense">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2zm0 4.8L16.14 18H12v-3h-.01L7.86 18 12 6.8z"/></svg>
      Air Defense
    </button>
    <button class="nav-btn" data-category="radar">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm-5.5-2.5l7.51-3.49L17.5 6.5 9.99 9.99 6.5 17.5zm5.5-6.6c.61 0 1.1.49 1.1 1.1s-.49 1.1-1.1 1.1-1.1-.49-1.1-1.1.49-1.1 1.1-1.1z"/></svg>
      Radar
    </button>
    <button class="nav-btn" data-category="analytics">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
      Analytics
    </button>
    <button class="nav-btn" data-category="tips">
      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6A4.997 4.997 0 017 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.68-.82 3.17-2.15 4.1z"/></svg>
      Tips & Tricks
    </button>
  </nav>

  <main class="main">
    <div class="toolbar">
      <div class="toolbar-left">
        <h2 id="categoryTitle" class="category-title">Aircraft</h2>
        <span id="itemCount" class="item-count"></span>
      </div>
      <div class="toolbar-right">
        <div class="filter-group">
          <label>Type:</label>
          <select id="filterType" class="filter-select">
            <option value="">All Types</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Operator:</label>
          <select id="filterOperator" class="filter-select">
            <option value="">All Branches</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Sort:</label>
          <select id="sortBy" class="filter-select">
            <option value="name-asc">Name (A-Z)</option>
            <option value="name-desc">Name (Z-A)</option>
            <option value="year-asc">Year (Oldest)</option>
            <option value="year-desc">Year (Newest)</option>
          </select>
        </div>
        <button id="viewToggle" class="btn btn-icon" title="Toggle view">
          <svg id="gridIcon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 3v8h8V3H3zm6 6H5V5h4v4zm-6 4v8h8v-8H3zm6 6H5v-4h4v4zm4-16v8h8V3h-8zm6 6h-4V5h4v4zm-6 4v8h8v-8h-8zm6 6h-4v-4h4v4z"/></svg>
          <svg id="listIcon" class="hidden" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
        </button>
      </div>
      <div id="typeIconFilters" class="type-icon-filters"></div>
    </div>

    <div id="content" class="content grid-view">
      <div class="loading">Loading data...</div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Country Picker Modal -->
  <div id="countryModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-country">
      <button class="modal-close">&times;</button>
      <h2 class="modal-title">Select Country</h2>
      <div class="country-search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" id="countrySearch" class="search-input country-search-input" placeholder="Search countries...">
      </div>
      <div id="countryGrid" class="country-grid"></div>
    </div>
  </div>

  <!-- Compare Modal -->
  <div id="compareModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-wide">
      <button class="modal-close">&times;</button>
      <h2 class="modal-title">Compare Items</h2>
      <div id="compareBody" class="compare-grid"></div>
    </div>
  </div>

  <!-- Tips & Tricks Submit Modal -->
  <div id="tipSubmitModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2 class="modal-title">Submit a Tip or Trick</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin:0 0 16px">Share your knowledge! The developer will review your submission and may add it to the site.</p>
      <div class="submit-tip-form" id="submitTipForm">
        <div>
          <label for="tipAuthorName">Your Name</label>
          <input type="text" id="tipAuthorName" placeholder="e.g. John S." maxlength="80">
        </div>
        <div>
          <label for="tipBody">Your Tip or Trick</label>
          <textarea id="tipBody" placeholder="Describe your tip in as much detail as you like..."></textarea>
        </div>
        <div class="submit-tip-actions">
          <button class="submit-tip-cancel" id="tipCancelBtn">Cancel</button>
          <button class="submit-tip-send" id="tipSendBtn">Send via Email</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://d3js.org/d3.v7.min.js" defer></script>
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
